<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:#08090b; font-family:'Barlow',sans-serif; overflow:hidden; }
#root { height:100%; display:flex; align-items:center; justify-content:center; }
button { font-family:inherit; -webkit-tap-highlight-color:transparent; }
.hscroll::-webkit-scrollbar { height:0; }
.vscroll::-webkit-scrollbar { width:0; }
@keyframes scrIn { from { transform:translateY(8px); } to { transform:none; } }
@keyframes celebIn { from { transform:perspective(1100px) rotateX(6deg) translateY(14px) scale(0.97); } to { transform:none; } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes toastIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
</style>

<body>
<div id="root"></div>

<script src="04accc08-815a-4e86-8cc6-f41439936cd1" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="aa7e061c-e6bb-48c6-a429-be64a06b9efc" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="ba3e516c-0801-495c-8483-5dcabccb471e" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="a9951460-d5b7-428d-a539-5ba061d03d87"></script>
<script type="text/babel" src="14a7e748-fa99-45be-a320-c2f54023b654"></script>
<script type="text/babel" src="78bc9416-5a3b-4fc6-8bf7-b10fc038fb20"></script>

<script type="text/babel">
const { useState, useEffect, useLayoutEffect, useRef } = React;
const INK = '#0a0c0f', YEL = '#f5c200';

// status bar
function StatusBar() {
  return (
    <div style={{ position: 'relative', display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '15px 26px 6px', fontSize: 15, fontWeight: 700, color: '#fff', flexShrink: 0 }}>
      <span>9:41</span>
      <div style={{ display: 'flex', gap: 7, alignItems: 'center' }}>
        <svg width="17" height="11" viewBox="0 0 17 11" fill="#fff"><rect x="0" y="6" width="3" height="5" rx="0.6"/><rect x="4" y="4" width="3" height="7" rx="0.6"/><rect x="8" y="2" width="3" height="9" rx="0.6"/><rect x="12" y="0" width="3" height="11" rx="0.6"/></svg>
        <svg width="16" height="11" viewBox="0 0 24 17" fill="none" stroke="#fff" strokeWidth="2"><path d="M1 6C5 2 19 2 23 6"/><path d="M4 10c3-3 13-3 16 0"/><path d="M7.5 14c2-2 7-2 9 0"/><circle cx="12" cy="17" r="1.5" fill="#fff"/></svg>
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 3, padding: '2px 5px', border: '1.2px solid #fff', borderRadius: 4 }}>
          <span style={{ fontSize: 10, fontWeight: 800, color: '#fff' }}>72</span>
          <span style={{ width: 8, height: 5, background: '#fff', borderRadius: 1 }}/>
        </div>
      </div>
    </div>
  );
}

// full celebration poster overlay
function Celebration({ workout, onClose, onShareToStory, onSavePoster }) {
  const Comp = SKINS[workout.skin] || SkinSlab;
  const v = VIBE[workout.vibe];
  const cardRef = useRef(null);
  const [scale, setScale] = useState(1);
  useLayoutEffect(() => {
    const el = cardRef.current; if (!el) return;
    const avail = 560; const h = el.offsetHeight;
    setScale(h > avail ? Math.max(0.6, avail / h) : 1);
  }, [workout]);
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 30 }}>
      {/* story backdrop */}
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(158deg, #1b2330 0%, #0e1318 46%, #15101a 100%)' }}/>
      <div style={{ position: 'absolute', inset: 0, opacity: 0.55, background: `radial-gradient(78% 48% at 22% 16%, rgba(120,150,190,0.26) 0%, transparent 60%), radial-gradient(72% 50% at 86% 90%, ${v.color}2a 0%, transparent 60%)` }}/>
      <div style={{ position: 'absolute', inset: 0, opacity: 0.4, mixBlendMode: 'overlay', backgroundImage: 'radial-gradient(rgba(255,255,255,0.85) 0.6px, transparent 0.6px)', backgroundSize: '4px 4px' }}/>
      <div style={{ position: 'relative', height: '100%', display: 'flex', flexDirection: 'column' }}>
        <StatusBar />
        {/* top bar */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 18px 0' }}>
          <button onClick={onClose} style={glass(38)}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
          {workout.isPR ? (
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '7px 13px', borderRadius: 999, background: YEL, color: INK, fontFamily: "'Barlow', sans-serif", fontSize: 11, fontWeight: 900, letterSpacing: '0.12em' }}>★ NEW PR POSTER</span>
          ) : workout.justLogged ? (
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 5, padding: '7px 13px', borderRadius: 999, background: YEL, color: INK, fontFamily: "'Barlow', sans-serif", fontSize: 11, fontWeight: 900, letterSpacing: '0.12em' }}>+{workout.ep} EP LOGGED</span>
          ) : <span/>}
          <div style={{ width: 38 }}/>
        </div>
        {/* poster */}
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '8px 30px', minHeight: 0 }}>
          <div style={{ width: '100%', animation: 'celebIn 0.5s cubic-bezier(.2,.7,.3,1)' }}>
            <div ref={cardRef} style={{ width: '100%', position: 'relative', transform: `scale(${scale})`, transformOrigin: 'center center' }}>
              <Comp wod={workout.wod} vibe={workout.vibe} />
              {workout.isPR && <PRRibbon />}
            </div>
          </div>
        </div>
        {/* actions */}
        <div style={{ padding: '8px 18px 26px', display: 'flex', gap: 10 }}>
          <button onClick={onShareToStory} style={{ flex: 1, height: 52, borderRadius: 15, border: 'none', cursor: 'pointer', background: `linear-gradient(100deg, ${YEL}, #ffe14d 60%, ${YEL})`, color: INK, fontSize: 14, fontWeight: 900, letterSpacing: '0.1em', textTransform: 'uppercase', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, boxShadow: `0 8px 24px ${YEL}40` }}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            Share to Story
          </button>
          <button onClick={onSavePoster} style={{ width: 52, height: 52, borderRadius: 15, cursor: 'pointer', background: 'rgba(255,255,255,0.1)', border: '1px solid rgba(255,255,255,0.16)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          </button>
        </div>
      </div>
    </div>
  );
}

function Toast({ msg }) {
  return (
    <div style={{ position: 'absolute', left: 0, right: 0, bottom: 96, display: 'flex', justifyContent: 'center', zIndex: 40, pointerEvents: 'none', animation: 'toastIn 0.3s ease' }}>
      <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '11px 18px', borderRadius: 999, background: 'rgba(20,22,26,0.95)', border: '1px solid rgba(255,255,255,0.14)', color: '#fff', fontSize: 13, fontWeight: 700, boxShadow: '0 10px 30px rgba(0,0,0,0.5)' }}>
        <span style={{ color: YEL }}>✎</span> {msg}
      </span>
    </div>
  );
}

console.log('[wodi] build check: log/settings flow v2 loaded');

function App() {
  const [screen, setScreen] = useState('today');
  const [record, setRecord] = useState(null);
  const [open, setOpen] = useState(null);   // workout for celebration
  const [toast, setToast] = useState(null);
  const [workouts, setWorkouts] = useState(WORKOUTS);
  const [monthEp, setMonthEp] = useState(MONTH_EP);
  const scrollRef = useRef(null);

  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [screen]);
  const showToast = (m) => { setToast(m); setTimeout(() => setToast(null), 2200); };

  const nav = (id) => { setRecord(null); setScreen(id); };

  const onShare = (w) => { setOpen(w); showToast('Ready to share to your story'); };
  const onShareToStory = () => { showToast('Shared to your story'); setOpen(null); };
  const onSavePoster = () => showToast('Poster saved to your camera roll');

  // turn a quick-pick template into a freshly "logged" poster, drop it at the
  // top of the collection, and open it in the celebration overlay.
  const handleLogged = (template) => {
    const skinIds = POSTER_SKINS.map(s => s.id);
    const vibeIds = Object.keys(VIBE);
    const skin = skinIds[Math.floor(Math.random() * skinIds.length)];
    const vibe = vibeIds[Math.floor(Math.random() * vibeIds.length)];
    const newWorkout = {
      id: 'logged-' + Date.now(), skin, vibe, ep: template.ep, isPR: false, when: 'Just now', justLogged: true,
      wod: {
        type: template.type, title: template.name, date: 'TODAY', format: template.format, sub: template.sub,
        blocks: template.blocks, result: template.result, totals: template.totals,
      },
    };
    setWorkouts(ws => [newWorkout, ...ws]);
    setMonthEp(e => e + template.ep);
    setScreen('today');
    setOpen(newWorkout);
  };

  let body;
  if (screen === 'today') body = <TodayScreen workouts={workouts} monthEp={monthEp} onOpenPoster={setOpen} onLog={() => setScreen('log')} onShare={onShare} onSeeAll={() => setScreen('gallery')} />;
  else if (screen === 'gallery') body = <GalleryScreen workouts={workouts} onOpenPoster={setOpen} onShare={onShare} />;
  else if (screen === 'me') body = <MeScreen onOpenRecords={() => setScreen('records')} onNav={nav} onShareProfile={() => showToast('Profile link copied')} onOpenSettings={() => setScreen('settings')} />;
  else if (screen === 'records') body = <RecordsScreen onBack={() => setScreen('me')} onOpenRecord={(r) => { setRecord(r); setScreen('detail'); }} />;
  else if (screen === 'detail') body = <RecordDetailScreen record={record} onBack={() => setScreen('records')} />;
  else if (screen === 'log') body = <LogScreen onBack={() => setScreen('today')} onLogged={handleLogged} />;
  else if (screen === 'settings') body = <SettingsScreen onBack={() => setScreen('me')} />;

  return (
    <div style={{ width: 396, height: 812, position: 'relative', overflow: 'hidden', background: '#0a0c0f', borderRadius: 40, boxShadow: '0 30px 80px rgba(0,0,0,0.7), inset 0 0 0 8px #15171c, inset 0 0 0 9px rgba(255,255,255,0.05)' }}>
      {/* ambient bg */}
      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, #101319 0%, #0a0c0f 38%)' }}/>
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 260, background: `radial-gradient(90% 60% at 50% -8%, ${YEL}18 0%, transparent 60%)` }}/>

      <div style={{ position: 'relative', height: '100%', display: 'flex', flexDirection: 'column' }}>
        <StatusBar />
        <div ref={scrollRef} className="vscroll" key={screen} style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', paddingBottom: 16, animation: 'scrIn 0.32s ease' }}>
          {body}
        </div>
        <BottomNav active={screen} onNav={nav} />
      </div>

      {open && <Celebration workout={open} onClose={() => setOpen(null)} onShareToStory={onShareToStory} onSavePoster={onSavePoster} />}
      {toast && <Toast msg={toast} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
